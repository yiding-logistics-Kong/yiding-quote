var lastQuote = null;
var inqWrap = document.getElementById("inqWrap");

function showInquiryModal() {
  if (!lastQuote || !lastQuote.c) { showToast("请先查询报价", "error"); return; }
  var svEl = document.querySelector(".tab.active");
  if (!svEl) return;
  document.getElementById("inqSummary").innerHTML = "<strong>询价内容：</strong>" + CN[lastQuote.c] + " · " + svEl.textContent + " · " + lastQuote.w + "KG" + (lastQuote.price ? " · 约¥" + lastQuote.price.toLocaleString() : "");
  document.getElementById("modalOverlay").classList.add("show");
  document.getElementById("inqName").value = "";
  document.getElementById("inqPhone").value = "";
  document.getElementById("inqWx").value = "";
  document.getElementById("inqNote").value = "";
}

function hideInquiryModal() {
  var el = document.getElementById("modalOverlay");
  if (el) el.classList.remove("show");
}

function submitInquiry() {
  var name = document.getElementById("inqName").value.trim();
  var phone = document.getElementById("inqPhone").value.trim();
  if (!name) { showToast("请填写您的姓名", "error"); return; }
  if (!phone || phone.length < 7) { showToast("请填写正确的手机号", "error"); return; }
  var wx = document.getElementById("inqWx").value.trim();
  var note = document.getElementById("inqNote").value.trim();
  var inqs = JSON.parse(localStorage.getItem("yd_inquiries") || "[]");
  inqs.push({t: new Date().toISOString(), name: name, phone: phone, wx: wx, note: note, quote: lastQuote});
  localStorage.setItem("yd_inquiries", JSON.stringify(inqs));
  showToast("询价已提交！孔先生会尽快联系您");
  hideInquiryModal();
}

function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (type === "error" ? " error" : "");
  t.style.display = "block";
  setTimeout(function() { t.style.display = "none"; }, 3000);
}

function sharePage() {
  if (navigator.share) {
    navigator.share({title: "义鼎国际 · 在线询价", text: "跨境物流运费查询，一键获取报价", url: window.location.href}).catch(function(){});

}
